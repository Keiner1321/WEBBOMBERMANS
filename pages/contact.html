<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos - Bomberos Voluntarios Santa Rosa del Sur</title>
    <!-- Importar CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="../images/logo.png">
    <link rel="stylesheet" href="../assets/css/pages/contact.css">
    <!-- Importar JavaScript principal -->
    <script src="../assets/js/main.js"></script>
</head>
<body>
        <!-- Contenedor donde se cargará el header -->
    <div id="header-container"></div>
    <h1>Contactos</h1>

 <section class="banner-slider">
  <div class="slides">
    <div class="slide active">
      <img src="../images/daniel.jpg" alt="Slide 1">
      <div class="caption">
        <h1>Bomberos Voluntarios</h1>
        <p>Santa Rosa del Sur</p>
      </div>
    </div>

    <div class="slide">
      <img src="../images/animal.jpg" alt="Slide 2">
      <div class="caption">
        <h1>Siempre listos</h1>
        <p>Protegiendo a la comunidad</p>
      </div>
    </div>

    <div class="slide">
      <img src="../images/transito.jpg" alt="Slide 3">
      <div class="caption">
        <h1>Haz la diferencia</h1>
        <p>Tu valor puede salvar vidas</p>
      </div>
    </div>
  </div>

  <!-- Botones -->
  <button class="btn prev">❮</button>
  <button class="btn next">❯</button>

  <!-- Indicadores -->
  <div class="indicators"></div>
</section>


        <!-- Contenedor donde se cargará el footer -->
    <div id="footer-container"></div>
</body>
</html>
